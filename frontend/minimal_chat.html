<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Chat UI</title>
    <!-- Socket.IO Client -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            transition: background 0.3s, color 0.3s;
        }
        body.dark-mode {
            background: #121212;
            color: #ffffff;
        }
        body.dark-mode #chat-container {
            background: #1e1e1e;
        }
        body.dark-mode #chat-box {
            background: #2a2a2a;
        }
        body.dark-mode .message {
            background: #333333;
            border-color: #444;
            color: #fff;
        }
        body.dark-mode .message strong {
            color: #ccc;
        }
        body.dark-mode #input-area {
            background: #1e1e1e;
            border-top-color: #444;
        }
        body.dark-mode #msg-input {
            background: #333;
            color: #fff;
            border-color: #555;
        }
        /* original body */
        body {
            font-family: 'Tiempos', 'Tiempos Text', Georgia, serif;
            background: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 400px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-box {
            height: 400px;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }
        .message {
            background: white;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #eee;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            word-break: break-word;
        }
        .message strong {
            display: block;
            margin-bottom: 4px;
            color: #333;
        }
        .score {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 12px;
            color: white;
            position: absolute;
            top: 12px;
            right: 12px;
            font-weight: bold;
        }
        /* Toxicity score colors */
        .score.green { background: #4caf50; }
        .score.yellow { background: #ff9800; }
        .score.red { background: #f44336; }
        
        .placeholder {
            background: #e8f5e9;
            color: #000000;
            font-style: italic;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border: 1px dashed #000000;
            font-weight: bold;
        }
        body.dark-mode .placeholder {
            background: rgba(0, 230, 118, 0.1);
            color: #00e676;
            border-color: #00e676;
        }
        #input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
            background: white;
        }
        #msg-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 8px;
            font-size: 14px;
        }
        #msg-input:focus {
            outline: none;
            border-color: #007bff;
        }
        #send-btn {
            padding: 10px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div style="position: absolute; top: 16px; right: 16px;">
    <button id="theme-toggle" onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">🌙</button>
</div>
<div id="chat-container">
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    // Connect to the backend
    // Note: I set this to port 5001 since app.py is currently configured to run on 5001!
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const btn = document.getElementById('theme-toggle');
        const isDark = document.body.classList.contains('dark-mode');
        btn.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') {
        toggleTheme();
    }

    const socket = io(window.location.origin);

    const msgInput = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");

    // When user submits a message
    sendBtn.addEventListener("click", sendMessage);
    msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    function sendMessage() {
        const msg = msgInput.value.trim();
        if (msg) {
            socket.emit("send_message", { message: msg, username: "User" });
            msgInput.value = "";
        }
    }

    // Safe message arrived — display it
    socket.on("new_message", (data) => {
        // Access the toxicity_score based on your ml_model.py response structure
        const score = data.result?.toxicity_score || 0; 
        addMessageToUI(data.message, data.username, score);
    });

    // Show a "message was removed" placeholder for flagged ones
    socket.on("flagged_message", (data) => {
        const reason = data.result?.primary_label || "toxicity";
        addFlaggedPlaceholder(reason);
    });

    function addMessageToUI(text, user, score) {
        const div = document.createElement("div");
        div.className = "message";
        
        // Determine badge color
        let colorClass = "green";
        if (score > 0.8) {
            colorClass = "red";
        } else if (score >= 0.5) {
            colorClass = "yellow";
        }
        
        div.innerHTML = `<strong>${user}:</strong> <span>${text}</span>
            <span class="score ${colorClass}">${(score * 100).toFixed(0)}%</span>`;
        
        const chatBox = document.getElementById("chat-box");
        chatBox.appendChild(div);
        
        // Scroll to bottom automatically
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addFlaggedPlaceholder(reason = "toxicity") {
        const div = document.createElement("div");
        div.className = "placeholder";
        div.textContent = `Message removed due to ${reason}`;
        
        const chatBox = document.getElementById("chat-box");
        chatBox.appendChild(div);
        
        // Scroll to bottom automatically
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
