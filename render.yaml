services:
  - type: web
    name: comment-moderator
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --chdir backend app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
